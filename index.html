<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SES Family · CS Workboard (prototype v4)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ses-gron:#737D7D; --ses-pink:#F58A82; --ses-orange:#FFB27D; --ses-beige:#F2E8DE; --ses-lysgra:#BABFBF;
    --ink:#2C3130; --ink-soft:#5E6664;--muted:#6E7670; --page:#FBF8F3; --card:#FFFFFF; --line:#E7E0D6; --gron-deep:#3F6553;
    --on:#6E9B86; --on-bg:#E6EEE9; --attn:#DB8B43; --attn-bg:#FBEBDA;
    --stalled:#D9665C; --stalled-bg:#FAE2DF; --recov:#6E89A8; --recov-bg:#E7ECF2; --churn:#8A8A8A; --churn-bg:#ECEAE6; --identified:#9AA3A1; --identified-bg:#ECEFEE; --awareness:#8195AE; --awareness-bg:#EAEEF3; --purchase:#6F9E91; --purchase-bg:#E6F0EC;
    --radius:14px; --shadow:0 1px 2px rgba(44,49,48,.04),0 6px 20px rgba(44,49,48,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",system-ui,sans-serif;background:var(--page);color:var(--ink);font-feature-settings:"tnum";line-height:1.45}
  h1,h2,h3{font-family:"Raleway","Inter",sans-serif;letter-spacing:-.01em}
  .tnum{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer}
  a{color:inherit}
  .topbar{display:flex;align-items:center;gap:18px;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:17px;font-family:"Raleway",sans-serif}
  .brand .mark{width:30px;height:30px;border-radius:9px;flex:none;background:linear-gradient(135deg,var(--ses-pink),var(--ses-orange));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
  .brand small{display:block;font-family:"Inter";font-weight:500;font-size:11px;color:var(--ink-soft);margin-top:-2px}
  .topbar .spacer{flex:1}
  .proto-tag{font-size:11px;font-weight:600;color:var(--gron-deep);background:var(--ses-beige);padding:5px 10px;border-radius:999px}
  .wrap{max-width:1280px;margin:0 auto;padding:26px 24px 70px}
  .pagehead h1{font-size:25px;font-weight:600}
  .pagehead p{color:var(--ink-soft);font-size:13px;margin-top:3px;max-width:640px}
  .pagehead{margin-bottom:18px}
  .strip{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:22px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px;box-shadow:var(--shadow);text-align:left;transition:transform .12s,border-color .12s}
  .stat:hover{transform:translateY(-2px)}
  .stat.active{border-color:var(--gron-deep);box-shadow:0 0 0 2px rgba(90,99,98,.15),var(--shadow)}
  .stat .n{font-family:"Raleway";font-size:28px;font-weight:600;line-height:1}
  .stat .l{font-size:11.5px;color:var(--ink-soft);margin-top:7px;display:flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .dot.on{background:var(--on)} .dot.attn{background:var(--attn)} .dot.stalled{background:var(--stalled)} .dot.recov{background:var(--recov)} .dot.renew{background:var(--ses-gron)} .dot.churn{background:var(--churn)} .dot.identified{background:var(--identified)} .dot.awareness{background:var(--awareness)} .dot.purchase{background:var(--purchase)} .dot.pipeline{background:var(--awareness)}
  .controls{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .search{flex:1;min-width:180px}
  .search input{width:100%;padding:10px 14px;border:1px solid var(--line);border-radius:10px;background:var(--card);font-size:14px;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gron-deep)}
  select{padding:10px 13px;border:1px solid var(--line);border-radius:10px;background:var(--card);font-size:13px;color:var(--ink);font-family:inherit}
  .tablecard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:760px}
  th,td{text-align:left;padding:12px 15px;font-size:13.5px}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap}
  tbody tr{border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:#FBF6EF}
  .kommune{font-weight:600;font-size:14px}
  .sub{color:var(--ink-soft);font-size:12px}
  .muted{color:var(--ink-soft)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .pill.on{background:var(--on-bg);color:#3f6553} .pill.attn{background:var(--attn-bg);color:#9a5a16}
  .pill.stalled{background:var(--stalled-bg);color:#9e3a31} .pill.recov{background:var(--recov-bg);color:#3f5876} .pill.churn{background:var(--churn-bg);color:#5a5a5a} .pill.identified{background:var(--identified-bg);color:#4f5755} .pill.awareness{background:var(--awareness-bg);color:#3f4a5c} .pill.purchase{background:var(--purchase-bg);color:#3d5a50}
  .ue{display:flex;align-items:center;gap:9px}
  .bar{height:6px;border-radius:3px;background:var(--ses-beige);overflow:hidden;width:74px;position:relative;flex:none}
  .bar>span{display:block;height:100%;border-radius:3px}
  .bar .mk{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--ink-soft);opacity:.55}
  .renew-soon{color:var(--stalled);font-weight:600}
  .nps-bad{color:var(--stalled);font-weight:600}
  .empty{padding:40px;text-align:center;color:var(--ink-soft)}
  .legend{font-size:11.5px;color:var(--ink-soft);margin-top:14px}
  .introcard{display:flex;gap:14px;align-items:flex-start;background:linear-gradient(120deg,var(--ses-beige) 0%,#FFFFFF 70%);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:16px}
  .introicon{width:46px;height:46px;border-radius:13px;flex:none;background:linear-gradient(135deg,var(--ses-pink),var(--ses-orange));display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 3px 10px rgba(245,138,130,.3)}
  .introtext{flex:1}
  .introttl{font-family:"Raleway";font-weight:600;font-size:14px;color:var(--gron-deep);margin-bottom:4px}
  .introtext p{font-size:13.5px;color:var(--ink);line-height:1.5}
  .docrow{margin-top:11px;display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .doclbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600;margin-right:2px}
  .docchip{font-size:11.5px;font-weight:500;color:var(--gron-deep);background:#FFFFFF;border:1px solid var(--line);padding:4px 10px;border-radius:999px}
  th.sortable{cursor:pointer;user-select:none;transition:color .1s}
  th.sortable:hover{color:var(--ink)}
  th.sorted{color:var(--gron-deep)}
  th .caret{font-size:9px;margin-left:4px;color:var(--gron-deep)}
  .smartbtn{font-size:13px;font-weight:600;padding:10px 13px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink-soft);font-family:inherit;white-space:nowrap}
  .smartbtn:hover{border-color:var(--gron-deep);color:var(--ink)}
  .smartbtn.on{background:var(--gron-deep);color:#fff;border-color:var(--gron-deep)}
  .panel.contacts h3 .csub{font-weight:500;font-size:11px;color:var(--ink-soft);margin-left:6px}
  .crow{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);align-items:flex-start}
  .crow:last-of-type{border-bottom:none}
  .crole{flex:0 0 42%;font-size:12px;font-weight:600;color:var(--ink-soft)}
  .cpeople{flex:1;display:flex;flex-direction:column;gap:2px;font-size:12.5px}
  .cname{color:var(--ink)}
  .cname.left{color:var(--stalled);text-decoration:line-through}
  .cpeople.missing{color:var(--stalled);font-weight:600}
  .cpeople.empty{color:var(--muted)}
  .cnone{font-size:12.5px;color:var(--ink-soft);padding:6px 0 10px;line-height:1.5}
  .sfbtn{display:inline-block;margin-top:10px;font-size:12px;font-weight:600;color:var(--gron-deep);text-decoration:none}
  .sfbtn:hover{text-decoration:underline}
  .samplepill{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#9a6a00;background:#fdeccb;border:1px solid #f0d39a;border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:middle}
  .samplenote{font-size:11px;color:var(--ink-soft);background:#fdf6e9;border:1px solid #f0d39a;border-radius:7px;padding:6px 9px;margin:2px 0 10px;line-height:1.45}
  .hs-row.is-sample .vv{font-style:italic}
  .hs-row.is-sample .nm{color:var(--ink-soft)}
  .msrow{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;padding:4px 0;color:var(--ink)}
  .msrow.pend{color:var(--ink-soft)}
  .msi{flex:0 0 16px;text-align:center;font-weight:700;font-size:13px}
  .msi.ok{color:var(--on)} .msi.no{color:var(--stalled)} .msi.pend{color:var(--muted)}
  .msbadge{font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;border-radius:5px;padding:2px 7px;margin-left:8px;vertical-align:middle}
  .msbadge.ok{color:#2f6d4f;background:#e3f3ea;border:1px solid #b9e0c9}
  .msbadge.no{color:#9a3417;background:#fbe6df;border:1px solid #f0c3b2}
  .panel.minstd h3 .csub{font-weight:500;font-size:11px;color:var(--ink-soft);margin-left:6px}
  .stat.dq .dqdot{display:inline-block;width:8px;height:8px;border-radius:2px;background:#c98a1e}
  .g34{font-size:9px;font-weight:700;color:#9a6a00;background:#fdeccb;border:1px solid #f0d39a;border-radius:4px;padding:0 4px;margin-left:2px}
  .panel.ops h3 .csub{font-weight:500;font-size:11px;color:var(--ink-soft);margin-left:6px}
  .opchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .opchip{font-size:11.5px;font-weight:600;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink-soft);font-family:inherit;cursor:pointer}
  .opchip:hover{border-color:var(--gron-deep);color:var(--ink)}
  .opchip.sel{background:var(--gron-deep);color:#fff;border-color:var(--gron-deep)}
  .opchip .opsug{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;background:#fdeccb;color:#9a6a00;border-radius:4px;padding:0 4px;margin-left:4px}
  .opchip.sel .opsug{background:rgba(255,255,255,.25);color:#fff}
  .opsprompt{font-size:12.5px;color:var(--ink-soft);line-height:1.5;padding:4px 0 6px}
  .opprog{display:flex;align-items:center;gap:10px;margin:2px 0 12px}
  .opbar{flex:1;height:6px;background:var(--line);border-radius:4px;overflow:hidden}
  .opbar span{display:block;height:100%;background:var(--gron-deep);border-radius:4px;transition:width .2s}
  .opprogn{font-size:11px;font-weight:600;color:var(--ink-soft);white-space:nowrap}
  .opsec{margin-bottom:11px}
  .opseclbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--gron-deep);margin-bottom:5px}
  .oprow{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;padding:3px 0;color:var(--ink)}
  .opbox{flex:0 0 17px;height:17px;border:1.5px solid var(--line);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;margin-top:1px}
  .opbox.on{background:var(--gron-deep);border-color:var(--gron-deep)}
  .naCard{border-radius:12px;padding:14px 16px;margin:0 0 14px;border:1px solid var(--line);background:var(--card);position:relative;border-left:4px solid var(--gron-deep)}
  .naCard.urgent{border-left-color:var(--stalled);background:#fdf3f2}
  .naCard.warn{border-left-color:var(--attn);background:#fdf6ee}
  .naCard.good{border-left-color:var(--on);background:#f0f6f2}
  .naLabel{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft)}
  .naTitle{font-family:"Raleway";font-size:18px;font-weight:600;color:var(--ink);margin:3px 0 4px}
  .naWhy{font-size:13px;color:var(--ink-soft);line-height:1.5}
  .nabtn{margin-top:11px;font-size:12.5px;font-weight:600;padding:8px 13px;border:none;border-radius:9px;background:var(--gron-deep);color:#fff;cursor:pointer;font-family:inherit}
  .nabtn:hover{background:#474f4e}
  .docchip.live{cursor:pointer;border:1px solid var(--gron-deep);background:#fff;color:var(--gron-deep);font-family:inherit}
  .docchip.live:hover{background:var(--gron-deep);color:#fff}
  .sfwrap{margin-top:14px}
  .sftoggle{font-size:12.5px;font-weight:600;color:var(--ink-soft);background:none;border:1px dashed var(--line);border-radius:9px;padding:9px 13px;cursor:pointer;font-family:inherit;width:100%;text-align:left}
  .sftoggle:hover{border-color:var(--gron-deep);color:var(--ink)}
  .sfwrap .panel{margin-top:12px}
  /* doc modal */
  .docOverlay{position:fixed;inset:0;background:rgba(44,49,48,.55);z-index:90;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow:auto}
  .docSheetWrap{background:var(--card);border-radius:14px;max-width:680px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden}
  .docToolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 16px;background:var(--page);border-bottom:1px solid var(--line)}
  .docTbTitle{font-size:11.5px;color:var(--ink-soft);line-height:1.4}
  .docTbBtns{display:flex;gap:8px;flex-shrink:0}
  .docTbBtn{font-size:12px;font-weight:600;padding:7px 13px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);cursor:pointer;font-family:inherit;white-space:nowrap}
  .docTbBtn.primary{background:var(--gron-deep);color:#fff;border-color:var(--gron-deep)}
  .docSheet{padding:0;max-height:74vh;overflow:auto}
  .docHead{background:var(--gron-deep);color:#fff;padding:20px 28px 0;position:relative}
  .docBrand{font-family:"Raleway";font-size:13px;font-weight:600;letter-spacing:.02em;opacity:.85}
  .docTitle{font-family:"Raleway";font-size:24px;font-weight:600;margin:2px 0 1px}
  .docMuni{font-size:13px;opacity:.9;padding-bottom:18px}
  .docwave{display:block;width:100%;height:18px;margin:0 -28px;width:calc(100% + 56px)}
  .docBody{padding:22px 28px 30px}
  .docBody h4{font-family:"Raleway";font-size:14px;font-weight:600;color:var(--gron-deep);margin:18px 0 6px}
  .docBody p{font-size:13px;color:var(--ink);line-height:1.55;margin:0}
  .docMeta{display:grid;grid-template-columns:1fr 1fr;gap:8px 22px;padding:14px 16px;background:var(--page);border-radius:10px;margin-bottom:6px}
  .docMeta>div{font-size:13px;color:var(--ink)}
  .dml{display:block;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:1px}
  .docList{margin:4px 0 0;padding-left:20px;font-size:13px;color:var(--ink);line-height:1.7}
  .docFill{color:var(--ink-soft);font-style:italic;background:var(--page);border-radius:7px;padding:9px 11px}
  .docNote{font-size:11.5px;color:var(--ink-soft);font-style:italic;margin-top:5px}
  .docTable{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
  .docTable td,.docTable th{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
  .docTable th{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft)}
  .tpform{display:flex;gap:6px;margin-bottom:11px}
  .tpform select,.tpform input{font-size:12px;padding:7px 8px;border:1px solid var(--line);border-radius:8px;font-family:inherit;background:var(--card);color:var(--ink)}
  .tpform select{flex:0 0 auto}
  .tpform input{flex:1;min-width:0}
  .tpform .logbtn{width:auto;margin:0;flex:0 0 auto;padding:7px 12px}
  .tpempty{font-size:12.5px;color:var(--ink-soft);font-style:italic;padding:8px 0;line-height:1.5}
  .recovbox{margin-top:10px;border:1px solid var(--line);border-radius:9px;padding:10px 11px;background:var(--page)}
  .recovbox.active{background:var(--recov-bg);border-color:var(--recov)}
  .recovttl{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:7px;display:flex;align-items:center;gap:6px}
  .recovttl .csub{font-weight:500;font-size:10px;color:var(--ink-soft)}
  .recovrow{display:flex;gap:6px;margin-bottom:7px}
  .recovrow input{flex:1;min-width:0;font-size:12px;padding:7px 8px;border:1px solid var(--line);border-radius:7px;font-family:inherit}
  .recovbtn,.recovclear{font-size:12px;font-weight:600;padding:7px 12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit}
  .recovbtn{background:var(--recov);color:#fff}
  .recovclear{background:var(--card);border:1px solid var(--line);color:var(--ink-soft);margin-top:2px}
  .recovline{font-size:12.5px;color:var(--ink);margin-bottom:3px}
  .dot.recov{background:var(--recov)}
  .readGate{margin:14px 0 4px;border:1px solid var(--line);border-radius:12px;padding:13px 15px;background:var(--card)}
  .readGate.met{background:#f0f6f2;border-color:#bcdccb}
  .rgTop{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:8px}
  .rgHead{font-size:13px;color:var(--ink-soft)} .rgHead b{color:var(--ink);font-weight:600}
  .rgCount{font-size:12px;font-weight:700;color:var(--gron-deep);white-space:nowrap}
  .rgBar{height:7px;background:var(--line);border-radius:4px;overflow:hidden;margin-bottom:9px}
  .rgBar span{display:block;height:100%;background:var(--gron-deep);border-radius:4px;transition:width .25s}
  .readGate.met .rgBar span{background:var(--on)}
  .rgUnmet{font-size:12px;color:var(--ink-soft);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .rgLbl{font-weight:600}
  .rgChip{background:var(--page);border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-size:11.5px;color:var(--ink)}
  .rgMore{font-size:11.5px;color:var(--ink-soft);font-style:italic}
  .rgDone{font-size:12.5px;color:#2f6d4f;font-weight:500}
  .chvchk{color:var(--on);font-weight:700}
  .segrow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:2px 0 16px}
  .seglbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);margin-right:2px}
  .segtog{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:var(--card);color:var(--ink-soft);font-family:inherit;cursor:pointer;transition:.12s}
  .segtog:hover{border-color:var(--gron-deep);color:var(--ink)}
  .segtog.on{background:var(--gron-deep);color:#fff;border-color:var(--gron-deep)}
  .segtog .segn{font-size:11px;font-weight:700;background:rgba(0,0,0,.06);border-radius:999px;padding:1px 7px;color:inherit}
  .segtog.on .segn{background:rgba(255,255,255,.22)}
  .panel.gates .gates-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .panel.gates .gates-head h3{margin:0}
  .gates-count{font-size:13px;font-weight:700;color:var(--gron-deep);white-space:nowrap}
  .gates-bar{height:6px;background:var(--line);border-radius:4px;overflow:hidden;margin:9px 0 4px}
  .gates-bar span{display:block;height:100%;background:var(--gron-deep);border-radius:4px;transition:width .25s}
  .gates-sub{font-size:11.5px;color:var(--ink-soft);font-style:italic;margin:0 0 13px}
  .gate{display:flex;gap:12px;padding:12px 13px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;background:var(--card);transition:border-color .12s,background .12s}

var _UDSTATS=null;
function marketToUD(m){return m==="\u00c5land"?"__none__":m;}
function periodRange(){
  const p=state.dashPeriod, now=new Date();
  const ser=(y,m,d)=>Math.floor((Date.UTC(y,m,d)-UD_EPOCH)/86400000);
  const today=ser(now.getFullYear(),now.getMonth(),now.getDate());
  if(p.preset==="all")return null;
  if(p.preset==="last12")return {from:today-365,to:today,label:"last 12 months"};
  if(p.preset==="thismonth")return {from:ser(now.getFullYear(),now.getMonth(),1),to:today,label:"this month"};
  if(p.preset==="lastmonth"){const m=now.getMonth(),y=now.getFullYear(),fm=m===0?11:m-1,fy=m===0?y-1:y;return {from:ser(fy,fm,1),to:ser(y,m,1)-1,label:"last month"};}
  if(p.preset==="thisq"){const q=Math.floor(now.getMonth()/3);return {from:ser(now.getFullYear(),q*3,1),to:today,label:"this quarter"};}
  if(p.preset==="lastq"){let q=Math.floor(now.getMonth()/3)-1,y=now.getFullYear();if(q<0){q=3;y--;}return {from:ser(y,q*3,1),to:ser(y,q*3+3,1)-1,label:"last quarter"};}
  if(p.preset==="custom"&&p.from&&p.to){const f=new Date(p.from),t=new Date(p.to);return {from:ser(f.getFullYear(),f.getMonth(),f.getDate()),to:ser(t.getFullYear(),t.getMonth(),t.getDate()),label:p.from+" \u2192 "+p.to};}
  return null;
}
function periodLabel(){const r=periodRange();return r?r.label:"all time";}
function udFilter(){
  const sc=state.dashScope, pr=periodRange(), out=[];
  const mkt=sc.type==="market"?marketToUD(sc.market):null;
  for(let i=0;i<UD.length;i+=5){
    const c=UD[i],ai=UD[i+1],t=UD[i+2],s=UD[i+3],fl=UD[i+4];
    if(pr&&(s<pr.from||s>pr.to))continue;
    if(sc.type==="market"){if(UD_COUNTRIES[c]!==mkt)continue;}
    else if(sc.type==="mine"){if(UD_ACCOWN[ai]!==sc.csa)continue;}
    out.push([c,ai,t,s,fl]);
  }
  return out;
}

function targetReachPanel(a){
  var s=statsFor(a); if(!s) return "";
  var act=actOf(a); var win=state.reachWin||"5y";
  function bar(reach,target,label,sub){
    var has=reach!=null;
    var c=(has&&target)?reach/target*100:null;
    var pct=c==null?0:Math.min(c,100);
    var ctxt=c==null?"\u2014":(c<1?c.toFixed(1):Math.round(c))+"%";
    var rtxt=has?reach.toLocaleString("en-US"):"\u2014";
    var ttxt=target?target.toLocaleString("en-US"):"\u2014";
    return '<div class="trRow"><div class="trTop"><span class="trLbl">'+label+'</span><span class="trCov">'+ctxt+'</span></div><div class="trBar"><span style="width:'+pct+'%"></span></div><div class="trNums">'+rtxt+' reached \u00b7 '+ttxt+' '+(sub||"in target group")+'</div></div>';
  }
  var adultReach=act?(win==="1y"?act.a1:act.a):null;
  var adultTarget=win==="1y"?s.adults1:s.adults;
  var childReach=act?(win==="1y"?act.c1:act.c):null;
  var childTarget=s.children;
  var toggle='<div class="trToggle"><button class="trWinBtn '+(win==="5y"?"on":"")+'" data-rwin="5y">Last 5 years</button><button class="trWinBtn '+(win==="1y"?"on":"")+'" data-rwin="1y">Last 1 year</button></div>';
  var cap=win==="1y"
    ? "Reach and target over the last year: adults against the 2025 family breaks, children against the current stock. Good for momentum and comparing newer and older accounts. Indicative."
    : "Reach over the last 5 years against the 5-year target group (Danmarks Statistik). The children target is the current stock of children in separated families. Indicative, not exact penetration.";
  var adultSub=win==="1y"?"broke up in 2025":"in the 5-year group";
  var profile=[];
  if(s.newDiv) profile.push(s.newDiv.toLocaleString("en-US")+" newly divorced per year");
  if(s.lowInc&&s.pop) profile.push(Math.round(s.lowInc/s.pop*100)+"% in low-income families");
  if(s.nonWest&&s.pop) profile.push(Math.round(s.nonWest/s.pop*100)+"% non-western background");
  if(s.schoolAbs) profile.push((Math.round(s.schoolAbs*1000)/10)+"% school absence (2024/25)");
  var prof=profile.length?'<div class="trProfile">'+profile.join(" \u00b7 ")+'</div>':"";

}

  var faChips=FOCUS_AREAS.map(function(f){return '<button class="stChip '+(focusOn(a,f.k)?"on":"off")+'" data-stfa="'+f.k+'">'+f.label+'</button>';}).join("");
  var b=st.biz;
  var statusSel='<select id="bizstatus" class="stSel">'+["none","draft","agreed"].map(function(v){var lbl=v==="none"?"No business case yet":v==="draft"?"Draft":"Agreed with Sales";return '<option value="'+v+'" '+(b.status===v?"selected":"")+'>'+lbl+'</option>';}).join("")+'</select>';
  return '<div class="panel stratPanel"><div class="gates-head"><h3>Strategy &amp; rollout</h3><span class="gates-count">'+summary+'</span></div>'+
    '<p class="gates-sub">Everything is on by default. Click a channel or focus area to mark it out of scope, and the recommendations stop suggesting it. Set these with Sales at handover.</p>'+
    '<div class="stGrp"><div class="stLbl">Rollout channels</div><div class="stChips">'+chChips+'</div></div>'+
    '<div class="stGrp"><div class="stLbl">Focus areas</div><div class="stChips">'+faChips+'</div></div>'+
    '<div class="stGrp"><div class="stLbl">Business case (agreed with Sales)</div><div class="stBiz">'+statusSel+
    '<input id="bizgoal" class="stInput" placeholder="Primary goal" value="'+(b.goal||"").replace(/"/g,"&quot;")+'">'+
    '<input id="bizmetric" class="stInput" placeholder="Agreed success measure" value="'+(b.metric||"").replace(/"/g,"&quot;")+'"></div></div></div>';
}
function stratDocSection(a){
  var chOut=CHANNELS.filter(function(c){return !channelOn(a,c.k);}).map(function(c){return c.label;});
  var faOut=FOCUS_AREAS.filter(function(f){return !focusOn(a,f.k);}).map(function(f){return f.label;});
  var b=stratWs(a).biz;
  var esc=function(s){return String(s||"").replace(/</g,"&lt;");};
  var rows=[];
  rows.push('<tr><td>Rollout channels</td><td>'+(chOut.length?((CHANNELS.length-chOut.length)+' of '+CHANNELS.length+' in scope. Out of scope: '+chOut.join(', ')):'All '+CHANNELS.length+' in scope')+'</td></tr>');
  rows.push('<tr><td>Focus areas</td><td>'+(faOut.length?((FOCUS_AREAS.length-faOut.length)+' of '+FOCUS_AREAS.length+' in scope. Out of scope: '+faOut.join(', ')):'All '+FOCUS_AREAS.length+' in scope')+'</td></tr>');
  rows.push('<tr><td>Business case</td><td>'+(b.status==="agreed"?"Agreed with Sales":b.status==="draft"?"Draft":"Not recorded")+'</td></tr>');
  if(b.goal) rows.push('<tr><td>Primary goal</td><td>'+esc(b.goal)+'</td></tr>');
  if(b.metric) rows.push('<tr><td>Agreed success measure</td><td>'+esc(b.metric)+'</td></tr>');
  return '<table class="docTable">'+rows.join('')+'</table>';
}
function render(){if(!window.__esc){window.__esc=1;document.addEventListener("keydown",function(e){if(e.key==="Escape"){if(state.doc){state.doc=null;render();}else if(state.chat&&state.chat.open){state.chat.open=false;render();}}});}state.view==="wf"?renderWorkflow():state.view==="dash"?renderDash():renderList();var ap=document.getElementById("app");if(state.doc){if(ap&&ap.innerHTML.indexOf('id="docOverlay"')===-1){ap.insertAdjacentHTML("beforeend",docModal());}wireDocModal();}if(ap){ap.insertAdjacentHTML("beforeend",chatBtn()+(state.chat.open?chatPanel():""));}wireChat();}
render();
</script>
</body>
</html>
